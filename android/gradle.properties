org.gradle.jvmargs=-Xmx8G -XX:MaxMetaspaceSize=4G -XX:ReservedCodeCacheSize=512m -XX:+HeapDumpOnOutOfMemoryError
android.useAndroidX=true
android.enableJetifier=true

# Performance optimizations
org.gradle.daemon=true

# NOTE (Windows): Some environments fail with
# "Could not pack tree 'incrementalFolder': Could not get file mode"
# when Gradle caching/parallelism is enabled. Disable these for stability.
org.gradle.parallel=false
org.gradle.configureondemand=false
org.gradle.caching=false

# R8 optimizations for faster app performance
android.enableR8.fullMode=true

# Keyboard performance optimization
android.enableD8.desugaring=true

# NOTE (Windows): Lint has been crashing on some plugin modules during
# release analysis (lintVitalAnalyzeRelease). Disable fatal lint for release.
android.lintAbortOnError=false

